services:
  base:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    image: mycomai-rag
    env_file:
      - ../.env
    volumes:
      - ../db/chroma_db:/app/chroma_db
      - ../src/company_llm_rag:/app/company_llm_rag
      - ../db/query_history.db:/app/query_history.db
    networks:
      - me

  data-loader:
    extends:
      service: base
    volumes:
      - ../data:/app/data
    command: >
      bash -c "
        echo 'Starting data extraction...' &&
        python3 company_llm_rag/data_extraction/jira/jira_extractor.py > data/jira_data.jsonl 2> >(tee data/jira_errors.log >&2) &&
        python3 company_llm_rag/data_extraction/confluence/confluence_extractor.py > data/confluence_data.jsonl 2> >(tee data/confluence_errors.log >&2) &&
        python3 company_llm_rag/data_extraction/m365/sharepoint_extractor.py > data/sharepoint_data.jsonl 2> >(tee data/sharepoint_errors.log >&2) &&
        python3 company_llm_rag/data_extraction/m365/teams_extractor.py > data/teams_data.jsonl 2> >(tee data/teams_errors.log >&2) &&
        echo 'Data extraction complete. Starting data loading...' &&
        cat data/jira_data.jsonl data/confluence_data.jsonl data/sharepoint_data.jsonl data/teams_data.jsonl | python3 company_llm_rag/data_loader.py &&
        echo 'Data loading complete!'
      "

  rag-system:
    extends:
      service: base
    command: python3 company_llm_rag/rag_system.py
    stdin_open: true
    tty: true

  web:
    extends:
      service: base
    command: uvicorn company_llm_rag.web_app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    restart: unless-stopped

  cron-scheduler:
    extends:
      service: base
    volumes:
      - ../data:/app/data
      - ./crontab:/etc/cron.d/my-cron
      - ./cron-entrypoint.sh:/app/cron-entrypoint.sh
    entrypoint: /bin/bash /app/cron-entrypoint.sh
    user: root
    restart: always

networks:
  me:
    driver: bridge

volumes:
  chroma_db:
    driver: local
  host_data:
    driver: local
