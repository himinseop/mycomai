name: knowledge-hub

services:
  base:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    image: mycomai-rag
    env_file:
      - ../.env
    environment:
      - CHROMA_DB_PATH=./db/chroma_db
      - SQLITE_JOURNAL_MODE=DELETE
      # 빌드 시 이미지에 구운 BUILD_VERSION을 기본 사용하되,
      # 호스트 셸에 BUILD_VERSION이 설정돼 있으면 그 값으로 주입(패스스루).
      # 값이 없으면 항목이 추가되지 않아 이미지의 ENV를 덮지 않음.
      - BUILD_VERSION
    volumes:
      - ../db:/app/db
      - ../src/company_llm_rag:/app/company_llm_rag
      - huggingface_cache:/root/.cache/huggingface
    networks:
      - me

  data-loader:
    extends:
      service: base
    volumes:
      - ../data:/app/data
    mem_limit: 4g
    mem_reservation: 1g
    command: >
      bash -c "
        echo 'Starting data extraction...' &&
        python3 company_llm_rag/data_extraction/jira/jira_extractor.py > data/jira_data.jsonl 2> >(tee data/jira_errors.log >&2) &&
        python3 company_llm_rag/data_extraction/confluence/confluence_extractor.py > data/confluence_data.jsonl 2> >(tee data/confluence_errors.log >&2) &&
        python3 company_llm_rag/data_extraction/m365/sharepoint_extractor.py > data/sharepoint_data.jsonl 2> >(tee data/sharepoint_errors.log >&2) &&
        python3 company_llm_rag/data_extraction/m365/teams_extractor.py > data/teams_data.jsonl 2> >(tee data/teams_errors.log >&2) &&
        echo 'Data extraction complete. Starting data loading...' &&
        cat data/jira_data.jsonl data/confluence_data.jsonl data/sharepoint_data.jsonl data/teams_data.jsonl | python3 company_llm_rag/data_loader.py &&
        echo 'Data loading complete!'
      "

  rag-system:
    extends:
      service: base
    command: python3 company_llm_rag/rag_system.py
    stdin_open: true
    tty: true

  # ChromaDB 서버 (#60 Stage 1: 로컬 분리 운영 → Stage 2: 별도 장비 이관)
  # 주의: web이 CHROMA_MODE=http일 때만 기동 (embedded와 동일 디렉토리 동시 접근 금지)
  chroma:
    image: chromadb/chroma:1.4.1
    volumes:
      - ../db/chroma_db:/data
    ports:
      # 주의: 1.x Rust 서버는 파이썬식 토큰 인증 env를 지원하지 않음 →
      # 로컬 단계에선 호스트 포트를 루프백에만 바인딩 (web은 내부 네트워크 chroma:8000 사용).
      # 원격 이관(Stage 2) 시 인증 사이드카 필요 — deploy/chroma-server 참고.
      - "127.0.0.1:9000:8000"
    restart: unless-stopped
    mem_limit: 2g
    networks:
      - me
    profiles: ["chroma-server"]

  web:
    extends:
      service: base
    command: uvicorn company_llm_rag.web_app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    # ChromaDB 원격 이관(#60) 후 하향 — 인덱스 캐시가 web에서 사라짐 (실사용 ~1GiB)
    mem_limit: 3g
    mem_reservation: 1g

  # 개발용: 코드 핫리로드 필요 시 `docker-compose --profile dev up web-dev`
  web-dev:
    extends:
      service: base
    command: uvicorn company_llm_rag.web_app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    profiles: ["dev"]

  cron-scheduler:
    extends:
      service: base
    volumes:
      - ../data:/app/data
      - ./crontab:/etc/cron.d/my-cron
      - ./cron-entrypoint.sh:/app/cron-entrypoint.sh
    entrypoint: /bin/bash /app/cron-entrypoint.sh
    user: root
    restart: always

networks:
  me:
    driver: bridge

volumes:
  chroma_db:
    driver: local
  host_data:
    driver: local
  huggingface_cache:
    driver: local
