<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ company_name }} 지식허브</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── 헤더 ── */
    header {
      background: #1a1a2e; color: white;
      padding: 0 20px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0; height: 56px;
    }
    .header-title { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 600; }
    .header-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    .header-btn:hover { background: rgba(255,255,255,0.2); }

    /* ── 메인 레이아웃 ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

    /* ── 랜딩 (빈 상태: 중앙 배치) ── */
    #empty-landing {
      display: none;
      flex-direction: column; align-items: center; text-align: center;
      gap: 8px; padding: 0 20px 20px;
    }
    #empty-landing img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 4px; }
    #empty-landing h2 { font-size: 20px; color: #1a1a2e; font-weight: 700; }
    #empty-landing p  { font-size: 14px; color: #888; }

    /* is-empty: feed 숨기고 input을 랜딩에 통합 */
    body.is-empty #main {
      justify-content: center; align-items: center; gap: 0; padding: 0 0 12vh;
    }
    body.is-empty #empty-landing { display: flex; }
    body.is-empty #feed-scroll   { display: none; }
    body.is-empty #input-wrapper {
      background: transparent; border-top: none;
      width: 100%; max-width: 680px; padding: 0 20px;
    }
    body.is-empty #input-area { padding: 0; }
    body.is-empty .input-box {
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      border-color: #d8d8e8;
    }

    /* 스크롤 피드 (전체 너비, 스크롤바 viewport 우측) */
    #feed-scroll { flex: 1; overflow-y: auto; min-height: 0; }
    #feed-scroll::-webkit-scrollbar { width: 4px; }
    #feed-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

    /* 내용 영역 최대 너비 제한 */
    .feed-inner {
      max-width: 800px; margin: 0 auto;
      padding: 20px 16px 16px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ── 질문 컨텍스트 카드 ── */
    .context-card {
      background: white; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* collapsed: 요약만 보임 */
    .context-summary {
      display: none; padding: 13px 16px;
      align-items: center; gap: 10px; cursor: pointer;
    }
    .context-summary:hover { background: #f8f8fc; }
    .context-summary-icon { font-size: 15px; flex-shrink: 0; }
    .context-summary-text {
      flex: 1; font-size: 14px; color: #555;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .context-expand-hint { font-size: 12px; color: #bbb; flex-shrink: 0; }

    .context-card.collapsed .context-summary { display: flex; }
    .context-card.collapsed .context-body { display: none; }

    /* ── Q&A 턴 ── */
    .qa-turn { border-bottom: 1px solid #f0f0f5; }
    .qa-turn:last-child { border-bottom: none; }

    /* Q 블록 */
    .qa-q { background: #f5f4ff; padding: 14px 16px; display: flex; gap: 10px; align-items: flex-start; }
    .qa-q-label {
      font-size: 11px; font-weight: 700; color: #4f46e5;
      background: #ede9fe; border-radius: 4px; padding: 2px 7px;
      flex-shrink: 0; margin-top: 2px; letter-spacing: 0.5px;
    }
    .qa-q-text { font-size: 14px; color: #1a1a2e; line-height: 1.6; white-space: pre-wrap; word-break: break-word; flex: 1; }

    /* A 블록 */
    .qa-a { padding: 16px; display: flex; gap: 12px; align-items: flex-start; }
    .qa-a-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; margin-top: 1px; }
    .qa-a-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .qa-a-body { flex: 1; min-width: 0; }
    .qa-a-name { font-size: 12px; font-weight: 600; color: #999; margin-bottom: 6px; }

    /* 답변 텍스트 (마크다운) */
    .qa-a-text { font-size: 14px; color: #1a1a2e; line-height: 1.6; word-break: break-word; }
    .qa-a-text p { margin: 0 0 6px; }
    .qa-a-text p:last-child { margin-bottom: 0; }
    .qa-a-text h1,.qa-a-text h2,.qa-a-text h3 { font-size: 1em; font-weight: 700; margin: 10px 0 4px; }
    .qa-a-text h1:first-child,.qa-a-text h2:first-child,.qa-a-text h3:first-child { margin-top: 0; }
    .qa-a-text ul,.qa-a-text ol { padding-left: 1.4em; margin: 4px 0; }
    .qa-a-text li { margin-bottom: 2px; }
    .qa-a-text code { background: #f1f1f7; border-radius: 3px; padding: 1px 5px; font-size: 0.88em; font-family: monospace; }
    .qa-a-text pre { background: #f1f1f7; border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
    .qa-a-text pre code { background: none; padding: 0; }
    .qa-a-text strong { font-weight: 700; }
    .qa-a-text em { font-style: italic; }
    .qa-a-text hr { border: none; border-top: 1px solid #e5e7eb; margin: 10px 0; }
    .qa-a-text table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 0.9em; }
    .qa-a-text th,.qa-a-text td { border: 1px solid #e5e7eb; padding: 5px 8px; text-align: left; }
    .qa-a-text th { background: #f8f8fc; font-weight: 600; }
    .qa-a-text a { color: #4f46e5; text-decoration: none; }
    .qa-a-text a:hover { text-decoration: underline; }
    .qa-a-text img { max-width: 100%; max-height: 300px; height: auto; border-radius: 6px; margin: 8px 0; border: 1px solid #e5e7eb; cursor: pointer; }
    .qa-a-text img:hover { opacity: 0.9; }

    /* 스트리밍 커서 */
    .stream-cursor {
      display: inline-block; width: 2px; height: 1em;
      background: #4f46e5; margin-left: 2px; vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* 로딩 메시지 & 글쓰기 이미지 */
    .loading-msg { font-size: 12px; color: #bbb; font-style: italic; margin-top: 4px; min-height: 18px; transition: opacity 0.35s; }
    .writing-img { width: 90px; display: block; margin-top: 6px; pointer-events: none; transition: opacity 0.5s; }

    /* ── 참고 문서 ── */
    .refs { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
    .refs-label { font-size: 11px; color: #ccc; margin-bottom: 2px; }
    .ref-item { display: flex; align-items: flex-start; gap: 6px; font-size: 12px; }
    .ref-item a { color: #4f46e5; text-decoration: none; word-break: break-word; min-width: 0; flex: 1; }
    .ref-item a:hover { text-decoration: underline; }
    .ref-time { font-size: 11px; color: #bbb; margin-left: 4px; white-space: nowrap; flex-shrink: 0; }
    .src-badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 4px; font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; }
    .src-badge.jira       { background: #0052CC; }
    .src-badge.confluence { background: #0065FF; }
    .src-badge.sharepoint { background: #038387; }
    .src-badge.excel      { background: #217346; }
    .src-badge.teams      { background: #6264A7; }
    .src-badge.local      { background: #6B7280; }

    /* ── 피드백 ── */
    .feedback-label { font-size: 12px; color: #bbb; }
    .feedback-btn {
      background: none; border: 1px solid #ebebeb; border-radius: 14px;
      padding: 2px 10px; cursor: pointer; font-size: 13px; color: #888;
      transition: background 0.15s, border-color 0.15s; line-height: 1.6;
    }
    .feedback-btn:hover { background: #f5f5f5; border-color: #ccc; }
    .feedback-btn.active-up   { background: #e8f5e9; border-color: #66bb6a; color: #2e7d32; }
    .feedback-btn.active-down { background: #fce4ec; border-color: #ef9a9a; color: #c62828; }
    .feedback-btn:disabled { cursor: default; opacity: 0.7; }

    /* ── 컨텍스트 푸터 (이어서 질문 + 액션 바) ── */
    .context-footer { border-top: 2px solid #f0f0f5; background: #fafafa; }

    /* 이어서 질문 — 답변 완료 전까지 숨김 */
    .followup-area { padding: 10px 12px; display: none; gap: 8px; align-items: flex-end; }
    .followup-area.visible { display: flex; }
    .followup-input {
      flex: 1; padding: 8px 12px; border: 1px solid #e0e0e0; border-radius: 8px;
      font-size: 13px; resize: none; height: 38px; max-height: 100px;
      outline: none; font-family: inherit; background: white; color: #1a1a2e;
    }
    .followup-input::placeholder { color: #bbb; }
    .followup-input:focus { border-color: #4f46e5; }
    .followup-btn {
      background: #4f46e5; color: white; border: none;
      padding: 0 14px; border-radius: 8px; cursor: pointer;
      font-size: 13px; height: 38px; white-space: nowrap;
    }
    .followup-btn:hover { background: #4338ca; }
    .followup-btn:disabled { background: #c5c5c5; cursor: not-allowed; }

    /* ── 하단 액션 바 (피드백 + Teams + 접기) ── */
    .ctx-action-bar {
      display: none; align-items: center; justify-content: flex-end;
      padding: 0 12px 10px; gap: 8px;
    }
    .ctx-action-bar.visible { display: flex; }
    .ctx-feedback-inline { display: flex; align-items: center; gap: 6px; margin-right: 4px; }
    /* Teams 문의 버튼 */
    .teams-inquiry-bar { display: none; }
    .teams-inquiry-bar.visible { display: flex; align-items: center; }
    .teams-inquiry-btn {
      background: none; border: 1px solid #d0d1ed; color: #6264A7;
      border-radius: 20px; padding: 5px 14px; cursor: pointer;
      font-size: 12px; display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .teams-inquiry-btn:hover { background: #f0f0fa; }
    .teams-inquiry-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    /* 접기 버튼 */
    .ctx-collapse-btn {
      background: none; border: none; color: #ccc; font-size: 11px;
      cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1.6;
    }
    .ctx-collapse-btn:hover { background: #f5f5f5; color: #888; }

    /* ── 하단 새 질문 입력창 ── */
    #input-wrapper {
      background: white; border-top: 1px solid #ebebeb; flex-shrink: 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    #input-area {
      max-width: 760px; margin: 0 auto;
      padding: 10px 16px 4px;
    }
    /* 통합 입력 박스 (ChatGPT 스타일) */
    .input-box {
      display: flex; align-items: flex-end; gap: 8px;
      background: white; border: 1.5px solid #e0e0e0; border-radius: 16px;
      padding: 10px 10px 10px 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .input-box:focus-within {
      border-color: #4f46e5;
      box-shadow: 0 2px 12px rgba(79,70,229,0.10);
    }
    #input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 15px; resize: none; height: 30px; max-height: 120px;
      font-family: inherit; color: #1a1a2e; line-height: 1.6;
      padding: 0;
    }
    #input::placeholder { color: #b0b0b0; }
    #send-btn {
      background: #4f46e5; color: white; border: none;
      width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    #send-btn:hover { background: #4338ca; }
    #send-btn:disabled { background: #d0d0d8; cursor: not-allowed; }
    .input-hint {
      text-align: center; font-size: 11px; color: #c8c8c8;
      padding: 5px 0 2px;
    }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      header { padding: 0 12px; height: 52px; }
      .header-title { font-size: 15px; gap: 8px; }
      .header-btn { padding: 5px 10px; font-size: 12px; }
      .feed-inner { padding: 12px 10px; gap: 8px; }
      .qa-q { padding: 12px; }
      .qa-a { padding: 12px; gap: 8px; }
      .qa-a-avatar { width: 24px; height: 24px; }
      .context-summary { padding: 10px 12px; }
      .followup-area { padding: 8px 10px; }
      .followup-input { height: 36px; font-size: 13px; }
      .followup-btn { height: 36px; padding: 0 12px; font-size: 13px; }
      .ctx-action-bar { padding: 0 10px 8px; gap: 6px; }
      #input-area { padding: 8px 10px 2px; }
      .input-box { border-radius: 14px; padding: 8px 8px 8px 14px; }
      #input { font-size: 14px; }
      #send-btn { width: 34px; height: 34px; border-radius: 9px; }
      #empty-landing h2 { font-size: 18px; }
      #empty-landing img { width: 72px; height: 72px; }
      body.is-empty #input-wrapper { padding: 0 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <img src="/static/osajang-header.jpg" alt="오사장" style="width:28px;height:28px;object-fit:contain;border-radius:50%;">
    {{ company_name }} 지식허브
  </div>
</header>

<div id="main">
  <!-- 랜딩 (빈 상태): 중앙 배치 -->
  <div id="empty-landing">
    <img src="/static/osajang.png" alt="오사장">
    <h2>안녕하세요, 오사장입니다 👋</h2>
    <p>슈퍼커넥트 업무에 관한 궁금한 점을 물어보세요.</p>
  </div>

  <!-- 대화 피드 -->
  <div id="feed-scroll">
    <div class="feed-inner" id="feed"></div>
  </div>

  <!-- 입력창 (랜딩 / 하단 공용) -->
  <div id="input-wrapper">
    <div id="input-area">
      <div class="input-box">
        <textarea id="input" placeholder="새로운 질문을 입력하세요." rows="1"></textarea>
        <button id="send-btn" onclick="sendNewQuestion()" title="전송">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
      <div class="input-hint" id="input-hint"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
<script>
  // ── 상태 ─────────────────────────────────────────────────────────────
  let activeCtxId = null;
  const ctxSessions   = {};   // ctxId → sessionId
  const ctxTurns      = {};   // ctxId → [{question, answer}]
  const ctxStreaming   = {};   // ctxId → bool
  const ctxTurnIndex  = {};   // ctxId → 현재 turn_index (마지막 완료 턴)
  const ctxLastRecord = {};   // ctxId → 마지막 record_id

  const feedScroll = document.getElementById('feed-scroll');
  const feed       = document.getElementById('feed');
  const input      = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');

  // 초기 상태: 랜딩 중앙 배치
  document.body.classList.add('is-empty');

  // ── 이벤트 ────────────────────────────────────────────────────────────
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); sendNewQuestion(); }
  });
  input.addEventListener('input', () => {
    input.style.height = '30px';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // ── 유틸 ──────────────────────────────────────────────────────────────
  function escapeHtml(t) {
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  const _renderer = new marked.Renderer();
  _renderer.link = ({ href, title, text }) => {
    const t = title ? ` title="${escapeHtml(title)}"` : '';
    return `<a href="${escapeHtml(href)}"${t} target="_blank" rel="noopener noreferrer">${text}</a>`;
  };
  marked.setOptions({ renderer: _renderer, breaks: false, gfm: true });

  function renderText(text) { return text ? marked.parse(text) : ''; }
  function toggleHubReply(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  function getSourceBadge(source, url) {
    if (source === 'jira')       return '<span class="src-badge jira">J</span>';
    if (source === 'confluence') return '<span class="src-badge confluence">C</span>';
    if (source === 'sharepoint') {
      if (url && /\.xlsx?/i.test(url)) return '<span class="src-badge excel">X</span>';
      return '<span class="src-badge sharepoint">S</span>';
    }
    if (source === 'teams') return '<span class="src-badge teams">T</span>';
    return '<span class="src-badge local">F</span>';
  }

  function getRefLabel(ref) {
    if (ref.source === 'jira') {
      let title = ref.title || '';
      // 제목이 이미 이슈 키로 시작하면 중복 제거
      if (ref.issue_key && title.startsWith(`[${ref.issue_key}]`))
        title = title.slice(`[${ref.issue_key}]`.length).trim();
      return ref.issue_key ? `[${ref.issue_key}] ${title}` : title;
    }
    if (ref.source === 'confluence') {
      const parts = [];
      if (ref.space_name) parts.push(ref.space_name);
      if (ref.ancestors) ref.ancestors.split(' / ').forEach(a => parts.push(a));
      parts.push(ref.title);
      return parts.join(' / ');
    }
    if (ref.source === 'sharepoint') {
      try {
        const u = new URL(ref.url);
        const fp = u.searchParams.get('file');
        if (fp) return decodeURIComponent(fp);
        const seg = decodeURIComponent((u.pathname.split('/').pop()) || '');
        if (seg && !seg.toLowerCase().endsWith('.aspx')) return seg;
      } catch (_) {}
      return ref.title;
    }
    if (ref.source === 'teams') {
      const parts = [];
      if (ref.chat_topic) parts.push(`[${ref.chat_topic}]`);
      else if (ref.channel_name) parts.push(`[${ref.channel_name}]`);
      if (ref.author) parts.push(ref.author);
      return parts.join(' ');
    }
    return ref.title || ref.url;
  }

  function getRefMeta(ref) {
    if (ref.source === 'teams' && ref.created_at) {
      try {
        const d = new Date(ref.created_at);
        return `<span class="ref-time">${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</span>`;
      } catch (_) {}
    }
    if (ref.page_nums && ref.page_nums.length > 0) {
      const isPpt = (ref.title||'').toLowerCase().match(/\.pptx?$/);
      const label = isPpt ? 'Slide' : 'p.';
      return `<span class="ref-time">${ref.page_nums.map(n => isPpt ? `${label} ${n}` : `${label}${n}`).join(', ')}</span>`;
    }
    return '';
  }

  // ── 로딩 메시지 ──────────────────────────────────────────────────────
  const _MSGS = [
    '질문을 이해하고 있어요.','적당한 문서를 찾고 있어요.','자료를 가지러 뛰어가고 있어요.',
    '관련 내용을 꼼꼼히 읽고 있어요.','답변을 정리하고 있어요.','혹시 더 좋은 자료가 없나 살펴보는 중이에요.',
    '아, 이게 맞는 것 같은데... 조금만요.','서랍 다 뒤지고 있어요. 잠깐만요.','거의 다 됐어요. 진짜로요.',
    '좋은 답변을 쓰려고 고심 중이에요.','문서들 사이에서 보물찾기 중이에요.','뇌를 풀가동 중이에요. 잠시만요.',
    '열심히 찾고 있으니 조금만 기다려 주세요!','관련 문서가 꽤 많네요. 제일 좋은 걸로 골라볼게요.',
    '최대한 정확하게 답하려고 신중하게 살펴보고 있어요.',
  ];
  function _startLoading(el) {
    let prev = -1;
    const pick = () => { let i; do { i = Math.floor(Math.random()*_MSGS.length); } while(i===prev); prev=i; return i; };
    el.textContent = '(' + _MSGS[pick()] + ')'; el.style.opacity = '1';
    return setInterval(() => {
      el.style.opacity = '0';
      setTimeout(() => { el.textContent = '(' + _MSGS[pick()] + ')'; el.style.opacity = '1'; }, 350);
    }, 5000);
  }
  function _stopLoading(el, tid) { clearInterval(tid); el.style.opacity = '0'; }

  // ── 컨텍스트 카드 생성 ───────────────────────────────────────────────
  function _newSessionId() { return 'sess-' + Math.random().toString(36).slice(2,9); }

  function createContextCard() {
    const ctxId = 'ctx-' + Date.now();
    ctxSessions[ctxId] = _newSessionId();
    ctxTurns[ctxId] = [];
    ctxStreaming[ctxId] = false;
    ctxTurnIndex[ctxId] = 0;
    ctxLastRecord[ctxId] = 0;

    const card = document.createElement('div');
    card.className = 'context-card';
    card.id = ctxId;
    card.innerHTML = `
      <div class="context-summary" onclick="expandContext('${ctxId}')">
        <span class="context-summary-icon">✅</span>
        <span class="context-summary-text"></span>
        <span class="context-expand-hint">펼치기 ▾</span>
      </div>
      <div class="context-body">
        <div class="context-turns"></div>
        <div class="context-footer">
          <div class="followup-area" id="followup-area-${ctxId}">
            <textarea class="followup-input" id="followup-${ctxId}"
              placeholder="이어서 질문하세요..." rows="1"
              onkeydown="handleFollowupKey(event,'${ctxId}')"
              oninput="autoResize(this)"></textarea>
            <button class="followup-btn" id="followup-btn-${ctxId}" onclick="sendFollowup('${ctxId}')">전송</button>
          </div>
          <div class="ctx-action-bar" id="action-bar-${ctxId}">
            <div class="ctx-feedback-inline" id="feedback-inline-${ctxId}"></div>
            <div class="teams-inquiry-bar" id="teams-bar-${ctxId}">
              <button class="teams-inquiry-btn" onclick="sendInquiry(this,'${ctxId}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                  <circle cx="16.5" cy="5.5" r="3"/>
                  <path d="M14 10h5a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-1v-5a3 3 0 0 0-3-3h-1z"/>
                  <circle cx="8" cy="6" r="3.5"/>
                  <path d="M3 14a5 5 0 0 1 5-5h0a5 5 0 0 1 5 5v4a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-4z"/>
                </svg>
                담당자에게 문의하기
              </button>
            </div>
            <button class="ctx-collapse-btn" onclick="collapseContext('${ctxId}')">접기 ▲</button>
          </div>
        </div>
      </div>
    `;
    return { card, ctxId };
  }

  function collapseContext(ctxId) {
    const card = document.getElementById(ctxId);
    if (!card || card.classList.contains('collapsed')) return;
    const firstQ = ctxTurns[ctxId]?.[0]?.question || '';
    card.querySelector('.context-summary-text').textContent = firstQ.slice(0, 100);
    card.classList.add('collapsed');
  }

  function expandContext(ctxId) {
    const card = document.getElementById(ctxId);
    if (!card) return;
    card.classList.remove('collapsed');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }

  // ── Q&A 턴 생성 ──────────────────────────────────────────────────────
  function createTurnEl(question) {
    const turn = document.createElement('div');
    turn.className = 'qa-turn';
    turn.innerHTML = `
      <div class="qa-q">
        <span class="qa-q-label">Q</span>
        <div class="qa-q-text">${escapeHtml(question)}</div>
      </div>
      <div class="qa-a">
        <div class="qa-a-avatar"><img src="/static/osajang-header.jpg" alt="오사장"></div>
        <div class="qa-a-body">
          <div class="qa-a-text qa-a-content"></div>
          <div class="loading-msg"></div>
          <img src="/static/osajang-writing.png" class="writing-img" alt="">
        </div>
      </div>
    `;
    return turn;
  }

  function finalizeTurnEl(turnEl, fullText, references) {
    const textEl = turnEl.querySelector('.qa-a-content');
    textEl.innerHTML = renderText(fullText);
    const body = turnEl.querySelector('.qa-a-body');

    if (references && references.length > 0) {
      const refsDiv = document.createElement('div');
      refsDiv.className = 'refs';
      refsDiv.innerHTML = '<div class="refs-label">참고 문서</div>';
      references.forEach((ref, idx) => {
        const item = document.createElement('div');
        item.className = 'ref-item';
        if (ref.hub_reply) {
          const btnId = `hub-reply-${Date.now()}-${idx}`;
          item.style.flexDirection = 'column';
          item.style.alignItems = 'stretch';
          item.innerHTML = `<div style="display:flex;align-items:center;gap:6px">
              ${getSourceBadge(ref.source, ref.url)}<span style="color:#555;font-size:12px">지식허브 관련 답변</span>
              <button onclick="toggleHubReply('${btnId}')" style="font-size:11px;padding:2px 8px;border:1px solid #10b981;border-radius:10px;background:#f0fdf4;color:#10b981;cursor:pointer">원문 보기</button>
            </div>
            <div id="${btnId}" style="display:none;margin-top:8px;padding:12px;background:#f8fffe;border:1px solid #d1fae5;border-radius:8px" class="qa-a-text"></div>`;
          setTimeout(() => {
            const el = document.getElementById(btnId);
            if (el) el.innerHTML = renderText(ref.hub_reply);
          }, 0);
        } else {
          item.innerHTML = `${getSourceBadge(ref.source, ref.url)}<a href="${escapeHtml(ref.url)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(ref.title||ref.url)}">${escapeHtml(getRefLabel(ref))}</a>${getRefMeta(ref)}`;
        }
        refsDiv.appendChild(item);
      });
      body.appendChild(refsDiv);
    }
  }

  function updateCtxFeedback(ctxId, recordId) {
    const bar = document.getElementById(`feedback-inline-${ctxId}`);
    if (!bar) return;
    ctxLastRecord[ctxId] = recordId;
    bar.innerHTML = `
      <span class="feedback-label">이 질문이 도움이 되었나요?</span>
      <button class="feedback-btn" data-rating="1" onclick="sendFeedback(this,${recordId},1,'${ctxId}')">👍</button>
      <button class="feedback-btn" data-rating="-1" onclick="sendFeedback(this,${recordId},-1,'${ctxId}')">👎</button>`;
  }

  // ── 새 질문 전송 ─────────────────────────────────────────────────────
  function sendNewQuestion() {
    const text = input.value.trim();
    if (!text) return;

    // 이전 컨텍스트 collapse
    if (activeCtxId) collapseContext(activeCtxId);

    input.value = '';
    input.style.height = '30px';
    sendBtn.disabled = true;
    document.body.classList.remove('is-empty');
    document.getElementById('input-hint').textContent = '오사장은 실수를 할 수 있습니다.';

    const { card, ctxId } = createContextCard();
    activeCtxId = ctxId;
    feed.appendChild(card);

    streamQuestion(text, ctxId, () => {
      sendBtn.disabled = false;
    });

    // 새 카드로 스크롤
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }

  // ── 이어서 질문 ─────────────────────────────────────────────────────
  function handleFollowupKey(e, ctxId) {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendFollowup(ctxId); }
  }

  function autoResize(el) {
    el.style.height = '38px';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function sendFollowup(ctxId) {
    const inp = document.getElementById(`followup-${ctxId}`);
    const btn = document.getElementById(`followup-btn-${ctxId}`);
    const text = inp.value.trim();
    if (!text || ctxStreaming[ctxId]) return;
    inp.value = '';
    inp.style.height = '38px';
    btn.disabled = true;
    // 이어서 질문 중 입력창 잠금
    const fa = document.getElementById(`followup-area-${ctxId}`);
    if (fa) fa.classList.remove('visible');
    streamQuestion(text, ctxId, () => {
      btn.disabled = false;
      if (fa) { fa.classList.add('visible'); inp.focus(); }
    });
  }

  // ── SSE 스트리밍 공통 ────────────────────────────────────────────────
  async function streamQuestion(text, ctxId, onComplete) {
    ctxStreaming[ctxId] = true;
    const card = document.getElementById(ctxId);
    const turnsEl = card.querySelector('.context-turns');

    const turnEl  = createTurnEl(text);
    turnsEl.appendChild(turnEl);

    const textEl  = turnEl.querySelector('.qa-a-content');
    const loadEl  = turnEl.querySelector('.loading-msg');
    const writeEl = turnEl.querySelector('.writing-img');

    const cursor = document.createElement('span');
    cursor.className = 'stream-cursor';
    textEl.appendChild(cursor);

    const loadTimer = _startLoading(loadEl);
    feedScroll.scrollTop = feedScroll.scrollHeight;

    let fullText = '', finalRefs = [];

    const scrollDown = () => { feedScroll.scrollTop = feedScroll.scrollHeight; };

    try {
      const res = await fetch('/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: ctxSessions[ctxId] }),
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let ev; try { ev = JSON.parse(line.slice(6)); } catch { continue; }

          if (ev.type === 'token') {
            if (loadEl.parentNode) { _stopLoading(loadEl, loadTimer); setTimeout(() => loadEl.remove(), 350); }
            fullText += ev.text;
            textEl.innerHTML = renderText(fullText);
            textEl.appendChild(cursor);
            scrollDown();
          } else if (ev.type === 'done') {
            finalRefs = ev.references || [];
            if (ev.answer) fullText = ev.answer;  // 인용 치환된 최종 답변으로 교체
          } else if (ev.type === 'meta') {
            cursor.remove();
            writeEl.style.opacity = '0';
            setTimeout(() => writeEl.remove(), 520);
            finalizeTurnEl(turnEl, fullText, finalRefs);
            ctxTurns[ctxId].push({ question: text, answer: fullText });
            if (ev.turn_index) ctxTurnIndex[ctxId] = ev.turn_index;
            if (ev.record_id)  ctxLastRecord[ctxId] = ev.record_id;
            if (ev.inquiry_available) {
              document.getElementById(`teams-bar-${ctxId}`).classList.add('visible');
            }
            // 하단 피드백 업데이트 (항상 최신 record_id로 갱신)
            if (ev.record_id) updateCtxFeedback(ctxId, ev.record_id);
            // 액션 바 표시
            document.getElementById(`action-bar-${ctxId}`)?.classList.add('visible');
            // 답변 완료 후 이어서 질문 입력창 표시
            const fa = document.getElementById(`followup-area-${ctxId}`);
            if (fa) {
              fa.classList.add('visible');
              document.getElementById(`followup-${ctxId}`)?.focus();
            }
            scrollDown();
          } else if (ev.type === 'error') {
            _stopLoading(loadEl, loadTimer);
            if (loadEl.parentNode) loadEl.remove();
            cursor.remove();
            textEl.innerHTML = renderText('오류가 발생했습니다. 다시 시도해주세요.');
            writeEl.style.opacity = '0'; setTimeout(() => writeEl.remove(), 520);
          }
        }
      }
    } catch (_) {
      _stopLoading(loadEl, loadTimer);
      if (loadEl.parentNode) loadEl.remove();
      cursor.remove();
      textEl.innerHTML = renderText('오류가 발생했습니다. 다시 시도해주세요.');
      if (writeEl.parentNode) { writeEl.style.opacity = '0'; setTimeout(() => writeEl.remove(), 520); }
    }

    ctxStreaming[ctxId] = false;
    if (onComplete) onComplete();
  }

  // ── 전체 초기화 ──────────────────────────────────────────────────────
  async function clearAll() {
    Object.values(ctxSessions).forEach(sid =>
      fetch(`/chat/${sid}`, { method: 'DELETE' }).catch(() => {})
    );
    for (const k in ctxSessions)   delete ctxSessions[k];
    for (const k in ctxTurns)      delete ctxTurns[k];
    for (const k in ctxStreaming)   delete ctxStreaming[k];
    for (const k in ctxTurnIndex)   delete ctxTurnIndex[k];
    for (const k in ctxLastRecord)  delete ctxLastRecord[k];
    activeCtxId = null;
    // 기존 카드 제거 후 랜딩 복원
    while (feed.firstChild) feed.removeChild(feed.firstChild);
    document.body.classList.add('is-empty');
    document.getElementById('input-hint').textContent = '';
    sendBtn.disabled = false;
  }

  // ── 피드백 ──────────────────────────────────────────────────────────
  async function sendFeedback(btn, recordId, rating, ctxId) {
    const bar  = btn.closest('.ctx-feedback-inline');
    const btns = bar.querySelectorAll('.feedback-btn');
    btns.forEach(b => b.disabled = true);
    try {
      const res  = await fetch('/feedback', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          record_id: recordId,
          rating,
          session_id: ctxSessions[ctxId] || '',
          scope: 'group',
        }),
      });
      const data = await res.json();
      if (data.success) {
        if (rating === 1) {
          btn.classList.add('active-up');
          bar.querySelector('[data-rating="-1"]').style.display = 'none';
        } else {
          btn.classList.add('active-down');
          bar.querySelector('[data-rating="1"]').style.display = 'none';
        }
      } else { btns.forEach(b => b.disabled = false); }
    } catch { btns.forEach(b => b.disabled = false); }
  }

  // ── Teams 문의 (컨텍스트 전체 이력 전송) ────────────────────────────
  async function sendInquiry(btn, ctxId) {
    const turns = ctxTurns[ctxId] || [];
    if (turns.length === 0) return;
    const originalHtml = btn.innerHTML;
    btn.disabled = true;
    btn.textContent = '전송 중...';
    // 전체 대화를 conversation_history로 변환
    const history = [];
    turns.forEach(t => {
      history.push({ role: 'user',      content: t.question });
      history.push({ role: 'assistant', content: t.answer   });
    });
    try {
      const res  = await fetch('/inquiry', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: turns[0].question, session_id: ctxSessions[ctxId], conversation_history: history }),
      });
      const data = await res.json();
      if (data.success) {
        const bar = document.getElementById(`teams-bar-${ctxId}`);
        if (bar) {
          bar.innerHTML = '<span style="font-size:12px;color:#6264A7;padding:0 2px">✅ 팀즈로 전송이 완료되었습니다.</span>';
        }
        const fa = document.getElementById(`followup-area-${ctxId}`);
        if (fa) fa.remove();
      } else {
        btn.textContent = '❌ 전송 실패';
        setTimeout(() => { btn.innerHTML = originalHtml; btn.disabled = false; }, 3000);
      }
    } catch {
      btn.innerHTML = originalHtml;
      btn.disabled = false;
    }
  }
</script>
