<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오사장 어드민</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; color: #333; }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 0 24px;
    display: flex;
    align-items: stretch;
    gap: 12px;
  }
  .header-title {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 0;
    font-size: 1.2rem;
    font-weight: 600;
    white-space: nowrap;
  }

  /* 탭 네비게이션 */
  .tabs {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    margin-left: 16px;
    flex: 1;
  }
  .tab-btn {
    padding: 10px 20px;
    background: transparent;
    border: none;
    color: #aaa;
    font-size: 0.9rem;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: #ddd; }
  .tab-btn.active { color: #fff; border-bottom-color: #6264a7; }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    padding: 16px 0;
  }
  .header-right select {
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid #555;
    background: #2a2a4e;
    color: #fff;
    font-size: 0.85rem;
    cursor: pointer;
  }

  main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* 탭 패널 */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── 대시보드 탭 ── */
  .metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .card .label { font-size: 0.78rem; color: #888; margin-bottom: 6px; }
  .card .value { font-size: 2rem; font-weight: 700; color: #1a1a2e; line-height: 1; }
  .card .sub   { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
  .card.green .value { color: #2e7d32; }
  .card.red   .value { color: #c62828; }

  .charts { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
  .chart-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .chart-card h2 { font-size: 0.9rem; color: #555; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }

  .bad-list-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    margin-bottom: 24px;
  }
  .bad-list-card h2 { font-size: 0.9rem; color: #555; margin-bottom: 16px; }

  /* ── 공통 테이블 ── */
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; padding: 8px 12px; background: #f5f6fa; color: #666; border-bottom: 1px solid #eee; font-weight: 600; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  /* 이력 테이블: 질문 제외 나머지 셀 중앙 정렬 */
  #history-table td:not(:nth-child(3)) { text-align: center; }
  #history-table th:not(:nth-child(3)) { text-align: center; }
  .q-text { font-weight: 500; text-align: left !important; }
  .a-text { color: #666; font-size: 0.82rem; }
  .ts-text { color: #aaa; white-space: nowrap; font-size: 0.78rem; }
  #bad-tbody tr:hover { background: #fff8f8; }
  .empty { color: #bbb; text-align: center; padding: 32px; font-size: 0.9rem; }
  /* '조사' 컬럼 배지 줄바꿈 방지 */
  #history-table td:last-child .badge { white-space: nowrap; }

  /* ── 이력 조회 탭 ── */
  .history-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    margin-bottom: 16px;
  }
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
  }
  .filter-bar input, .filter-bar select {
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 0.85rem;
    background: #fff;
  }
  .filter-bar input[type="text"] { flex: 1; min-width: 160px; }
  .filter-bar input[type="date"] { width: 140px; }
  .btn {
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-primary { background: #6264a7; color: #fff; }
  .btn-primary:hover { background: #4f51a0; }
  .btn-secondary { background: #eee; color: #555; }
  .btn-secondary:hover { background: #ddd; }

  tr.no-answer-row { background: #fff5f5; }
  tr.no-answer-row:hover { background: #ffe8e8; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: rgba(98,100,167,.05); }

  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge-no-answer { background: #ffebee; color: #c62828; }
  .badge-ok        { background: #e8f5e9; color: #2e7d32; }
  .badge-up        { background: #e3f2fd; color: #1565c0; }
  .badge-down      { background: #fce4ec; color: #c62828; }
  .badge-pending   { background: #fff8e1; color: #f57f17; }
  .badge-done      { background: #e8f5e9; color: #2e7d32; cursor: pointer; text-decoration: underline; }
  .badge-error     { background: #fce4ec; color: #b71c1c; }

  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
    font-size: 0.85rem;
  }
  .page-info { color: #666; }

  /* ── 설정 탭 ── */
  .settings-card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    max-width: 560px;
  }
  .settings-card h2 { font-size: 0.95rem; color: #555; margin-bottom: 20px; font-weight: 600; }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; }
  .setting-desc  { font-size: 0.8rem; color: #888; }

  /* 토글 스위치 */
  .toggle { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: #ccc;
    border-radius: 24px;
    cursor: pointer;
    transition: background .2s;
  }
  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .toggle input:checked + .toggle-slider { background: #6264a7; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

  /* ── 모달 ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 14px;
    padding: 28px;
    max-width: 900px;
    width: 94%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .modal-header h3 { font-size: 1rem; color: #1a1a2e; }
  .modal-close {
    background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #999; line-height: 1;
    padding: 0 4px;
  }
  .modal-section { margin-bottom: 14px; }
  .modal-section label { font-size: 0.78rem; color: #888; display: block; margin-bottom: 4px; }
  .modal-section .content-box {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 12px;
    font-size: 0.87rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .modal-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.8rem; color: #888; margin-bottom: 14px; }
  .analysis-box {
    font-size: 0.85rem;
    line-height: 1.7;
    word-break: break-word;
  }
  .analysis-box h4 {
    font-size: 0.85rem;
    font-weight: 600;
    color: #1a1a2e;
    margin: 14px 0 4px;
    padding-bottom: 3px;
    border-bottom: 1px solid #eee;
  }
  .analysis-box h4:first-child { margin-top: 0; }
  .analysis-box p { margin: 4px 0 10px; color: #444; }
  .analysis-box ul { margin: 4px 0 10px; padding-left: 18px; color: #444; }
  .analysis-box li { margin-bottom: 3px; }
  .markdown-body { line-height: 1.6; }
  .markdown-body h1,.markdown-body h2,.markdown-body h3 { margin: .6em 0 .3em; font-size: 1em; font-weight: 700; }
  .markdown-body ul,.markdown-body ol { margin: .4em 0 .4em 1.4em; }
  .markdown-body p { margin: .4em 0; }
  .markdown-body code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: .88em; }
  .markdown-body pre { background: #f5f5f5; padding: 10px; border-radius: 6px; overflow-x: auto; }
  .markdown-body table { border-collapse: collapse; width: 100%; margin: .4em 0; }
  .markdown-body td, .markdown-body th { border: 1px solid #ddd; padding: 5px 8px; }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <span style="font-size:1.4rem;">📊</span>
    오사장 어드민
  </div>
  <nav class="tabs">
    <button class="tab-btn active" onclick="switchTab('dashboard', this)">대시보드</button>
    <button class="tab-btn" onclick="switchTab('history', this)">이력 조회</button>
    <button class="tab-btn" onclick="switchTab('settings', this)">설정</button>
  </nav>
  <div class="header-right" id="period-wrap">
    <label for="period">기간:</label>
    <select id="period" onchange="loadStats()">
      <option value="7">최근 7일</option>
      <option value="14" selected>최근 14일</option>
      <option value="30">최근 30일</option>
    </select>
  </div>
</header>

<main>

  <!-- ── 대시보드 탭 ── -->
  <div class="tab-panel active" id="tab-dashboard">
    <div class="metrics">
      <div class="card">
        <div class="label">총 질문 수</div>
        <div class="value" id="m-total">—</div>
        <div class="sub" id="m-period"></div>
      </div>
      <div class="card green">
        <div class="label">답변 성공률</div>
        <div class="value" id="m-success">—</div>
        <div class="sub">답변 찾음 비율</div>
      </div>
      <div class="card">
        <div class="label">평균 응답시간</div>
        <div class="value" id="m-avg-ms">—</div>
        <div class="sub">검색+LLM 합산</div>
      </div>
      <div class="card green">
        <div class="label">👍 만족</div>
        <div class="value" id="m-up">—</div>
        <div class="sub" id="m-satis"></div>
      </div>
      <div class="card red">
        <div class="label">👎 불만족</div>
        <div class="value" id="m-down">—</div>
        <div class="sub">피드백 받음</div>
      </div>
    </div>

    <div class="charts">
      <div class="chart-card">
        <h2>소스 분포</h2>
        <div class="chart-wrap"><canvas id="chart-source"></canvas></div>
      </div>
      <div class="chart-card">
        <h2>시간대별 질문 수 (KST)</h2>
        <div class="chart-wrap"><canvas id="chart-hourly"></canvas></div>
      </div>
    </div>

    <div class="bad-list-card">
      <h2>최근 👎 피드백 (최대 20건)</h2>
      <table>
        <thead>
          <tr>
            <th style="width:140px">시간</th>
            <th>질문 / 답변 미리보기</th>
          </tr>
        </thead>
        <tbody id="bad-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── 이력 조회 탭 ── -->
  <div class="tab-panel" id="tab-history">
    <div class="history-card">
      <div class="filter-bar">
        <input type="text" id="h-q" placeholder="질문 검색..." onkeydown="if(event.key==='Enter') loadHistory(1)">
        <input type="date" id="h-from" title="시작일">
        <input type="date" id="h-to" title="종료일">
        <select id="h-no-answer">
          <option value="">전체</option>
          <option value="1">답변없음만</option>
          <option value="0">답변있음만</option>
        </select>
        <select id="h-feedback">
          <option value="">피드백 전체</option>
          <option value="1">👍 만족</option>
          <option value="-1">👎 불만족</option>
        </select>
        <button class="btn btn-primary" onclick="loadHistory(1)">검색</button>
        <button class="btn btn-secondary" onclick="resetHistoryFilter()">초기화</button>
      </div>

      <table id="history-table">
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th style="width:110px">일시</th>
            <th>질문</th>
            <th style="width:80px">참고문서</th>
            <th style="width:80px">응답시간</th>
            <th style="width:60px">피드백</th>
            <th style="width:60px">답변</th>
            <th style="width:70px">결과분석</th>
          </tr>
        </thead>
        <tbody id="history-tbody">
          <tr><td colspan="8" class="empty">검색 버튼을 눌러 조회하세요.</td></tr>
        </tbody>
      </table>

      <div class="pagination" id="history-pagination" style="display:none;">
        <button class="btn btn-secondary" id="page-prev" onclick="loadHistory(currentPage-1)">← 이전</button>
        <span class="page-info" id="page-info"></span>
        <button class="btn btn-secondary" id="page-next" onclick="loadHistory(currentPage+1)">다음 →</button>
      </div>
    </div>
  </div>

  <!-- ── 설정 탭 ── -->
  <div class="tab-panel" id="tab-settings">
    <div class="settings-card">
      <h2>⚙️ 어드민 설정</h2>
      <div class="setting-row">
        <div>
          <div class="setting-label">결과보고서 작성</div>
          <div class="setting-desc">모든 답변에 대해 결과보고서를 자동으로 작성합니다. 답변이 있는 경우 답변·검색결과·첨부문서를, 답변이 없는 경우 원인 분석을 기록합니다.</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-analyze" onchange="updateSetting('analyze_no_answer', this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>

</main>

<!-- ── 모달 (공용) ── -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  let sourceChart = null;
  let hourlyChart = null;
  let currentPage = 1;
  let totalPages = 1;

  const SOURCE_COLORS = {
    jira:       '#0052cc',
    confluence: '#172b4d',
    teams:      '#6264a7',
    sharepoint: '#038387',
    local:      '#b17e00',
  };

  // ── 탭 전환 ───────────────────────────────────────────────────────────────
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
    document.getElementById('period-wrap').style.display = name === 'dashboard' ? '' : 'none';

    if (name === 'history' && document.getElementById('history-tbody').children.length === 1
        && document.getElementById('history-tbody').children[0].children[0].colSpan > 1) {
      loadHistory(1);
    }
    if (name === 'settings') loadSettings();
  }

  // 이력 탭으로 이동 후 상세 팝업 오픈
  async function goToDetail(recordId) {
    const histBtn = document.querySelector('.tab-btn:nth-child(2)');
    switchTab('history', histBtn);
    await loadHistory(1);
    openDetailModal(recordId);
  }

  // ── 유틸 ──────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 마크다운 렌더링 ─────────────────────────────────────────────────────
  const _mdRenderer = new marked.Renderer();
  _mdRenderer.link = ({ href, title, text }) => {
    const t = title ? ` title="${escHtml(title)}"` : '';
    return `<a href="${escHtml(href)}"${t} target="_blank" rel="noopener noreferrer">${text}</a>`;
  };
  marked.setOptions({ renderer: _mdRenderer, breaks: false, gfm: true });
  function renderMd(text) { return text ? marked.parse(text) : ''; }

  function fmtTs(iso) {
    const d = new Date(iso);
    return d.toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12: false });
  }

  function fmtTsFull(iso) {
    const d = new Date(iso);
    return d.toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false });
  }

  // 오늘이면 HH:MM, 1주일 이내면 요일+시간, 이후 상대 시간 (N주전 / N달전 / N년전)
  function fmtRelative(iso) {
    const now  = new Date();
    const d    = new Date(iso);
    const todayStr = now.toLocaleDateString('ko-KR');
    const dStr     = d.toLocaleDateString('ko-KR');
    if (todayStr === dStr) {
      // 오늘 → HH:MM
      return d.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', hour12: false });
    }
    const diffMs   = now - d;
    const diffDays = Math.floor(diffMs / 86400000);
    if (diffDays < 7) {
      // 1주일 이내 → 요일 HH:MM
      const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
      const day = dayNames[d.getDay()];
      const time = d.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', hour12: false });
      return day + '요일 ' + time;
    }
    if (diffDays < 30)  return Math.floor(diffDays / 7) + '주전';
    if (diffDays < 365) return Math.floor(diffDays / 30) + '달전';
    return Math.floor(diffDays / 365) + '년전';
  }

  // ── 대시보드 ──────────────────────────────────────────────────────────────
  async function loadStats() {
    const days = document.getElementById('period').value;
    document.getElementById('m-period').textContent = `최근 ${days}일`;

    let data;
    try {
      const res = await fetch(`/admin/stats?days=${days}`);
      if (!res.ok) { alert('통계 로딩 실패 (' + res.status + ')'); return; }
      data = await res.json();
    } catch(e) {
      alert('네트워크 오류: ' + e.message);
      return;
    }

    document.getElementById('m-total').textContent   = data.total.toLocaleString();
    document.getElementById('m-success').textContent = data.success_rate + '%';
    document.getElementById('m-avg-ms').textContent  = fmtMs(data.avg_response_ms);
    document.getElementById('m-up').textContent      = data.thumbs_up.toLocaleString();
    document.getElementById('m-down').textContent    = data.thumbs_down.toLocaleString();
    document.getElementById('m-satis').textContent   =
      data.satisfaction_rate !== null ? `만족도 ${data.satisfaction_rate}%` : '피드백 없음';

    const srcLabels = Object.keys(data.source_counts);
    const srcValues = Object.values(data.source_counts);
    const srcColors = srcLabels.map(s => SOURCE_COLORS[s] || '#999');

    if (sourceChart) sourceChart.destroy();
    if (srcLabels.length === 0) {
      document.getElementById('chart-source').parentElement.innerHTML = '<p class="empty">데이터 없음</p>';
    } else {
      sourceChart = new Chart(document.getElementById('chart-source'), {
        type: 'doughnut',
        data: { labels: srcLabels, datasets: [{ data: srcValues, backgroundColor: srcColors, borderWidth: 2 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12 } } },
        },
      });
    }

    const hourlyMap = {};
    for (const h of data.hourly) {
      const kstHour = (parseInt(h.hour, 10) + 9) % 24;
      hourlyMap[kstHour] = (hourlyMap[kstHour] || 0) + h.count;
    }
    const allHours = Array.from({ length: 24 }, (_, i) => i);
    const hourlyValues = allHours.map(h => hourlyMap[h] || 0);

    if (hourlyChart) hourlyChart.destroy();
    hourlyChart = new Chart(document.getElementById('chart-hourly'), {
      type: 'bar',
      data: {
        labels: allHours.map(h => `${String(h).padStart(2,'0')}시`),
        datasets: [{ label: '질문 수', data: hourlyValues, backgroundColor: '#6264a7', borderRadius: 4 }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 10 } } },
          y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } },
        },
      },
    });

    const tbody = document.getElementById('bad-tbody');
    tbody.innerHTML = '';
    if (data.recent_thumbs_down.length === 0) {
      tbody.innerHTML = '<tr><td colspan="2" class="empty">👎 피드백 없음</td></tr>';
    } else {
      for (const row of data.recent_thumbs_down) {
        const tr = document.createElement('tr');
        tr.style.cursor = 'pointer';
        tr.title = '클릭하면 이력 상세 보기';
        tr.onclick = () => goToDetail(row.id);
        tr.innerHTML = `
          <td class="ts-text" title="${fmtTsFull(row.created_at)}">${fmtRelative(row.created_at)}</td>
          <td>
            <div class="q-text">❓ ${escHtml(row.question)}</div>
            <div class="a-text">🤖 ${escHtml(row.answer)}</div>
          </td>`;
        tbody.appendChild(tr);
      }
    }
  }

  // ── 이력 조회 ─────────────────────────────────────────────────────────────
  async function loadHistory(page) {
    page = Math.max(1, page);
    if (totalPages > 0 && page > totalPages) return;

    const q          = document.getElementById('h-q').value.trim();
    const dateFrom   = document.getElementById('h-from').value;
    const dateTo     = document.getElementById('h-to').value;
    const noAnswer   = document.getElementById('h-no-answer').value;
    const feedback   = document.getElementById('h-feedback').value;

    const params = new URLSearchParams({ page, page_size: 20 });
    if (q)        params.set('q', q);
    if (dateFrom) params.set('date_from', dateFrom);
    if (dateTo)   params.set('date_to', dateTo);
    if (noAnswer !== '') params.set('is_no_answer', noAnswer);
    if (feedback !== '') params.set('feedback', feedback);

    const tbody = document.getElementById('history-tbody');
    tbody.innerHTML = '<tr><td colspan="8" class="empty">불러오는 중...</td></tr>';

    let data;
    try {
      const res = await fetch('/admin/history/data?' + params);
      if (!res.ok) { tbody.innerHTML = '<tr><td colspan="8" class="empty">오류: ' + res.status + '</td></tr>'; return; }
      data = await res.json();
    } catch(e) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">네트워크 오류</td></tr>';
      return;
    }

    currentPage = data.page;
    totalPages  = data.total_pages;

    tbody.innerHTML = '';
    if (data.items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">결과 없음</td></tr>';
    } else {
      for (const row of data.items) {
        const tr = document.createElement('tr');
        if (row.is_no_answer) tr.classList.add('no-answer-row');

        const feedbackBadge = row.feedback === 1
          ? '<span class="badge badge-up">👍</span>'
          : row.feedback === -1
          ? '<span class="badge badge-down">👎</span>'
          : '—';

        // 답변 셀: 클릭 시 상세 모달
        const answerBadge = row.is_no_answer
          ? `<span class="badge badge-no-answer" style="cursor:pointer" onclick="openDetailModal(${row.id})">없음</span>`
          : `<span class="badge badge-ok" style="cursor:pointer" onclick="openDetailModal(${row.id})">있음</span>`;

        // 참고문서 셀: 참고문서가 있을 때만 클릭 가능
        const refCell = row.ref_count > 0
          ? `<span class="badge badge-ok" style="cursor:pointer" onclick="openRefsModal(${row.id})">${row.ref_count}건</span>`
          : '<span style="color:#ccc">—</span>';

        // 응답시간 셀: 클릭 시 단계별 타이밍
        const perfCell = row.response_time_ms != null
          ? `<span class="ts-text" style="cursor:pointer;text-decoration:underline dotted" onclick="openPerfModal(${row.id})">${fmtMs(row.response_time_ms)}</span>`
          : '—';

        // 조사 셀
        const analysisBadge = buildAnalysisBadge(row);

        // 질문 셀: 클릭 시 상세 모달
        const questionCell = `<span style="cursor:pointer" onclick="openDetailModal(${row.id})">${escHtml(row.question.substring(0, 80))}${row.question.length > 80 ? '…' : ''}</span>`;

        tr.innerHTML = `
          <td class="ts-text">${row.id}</td>
          <td class="ts-text" title="${fmtTsFull(row.created_at)}">${fmtRelative(row.created_at)}</td>
          <td class="q-text">${questionCell}</td>
          <td>${refCell}</td>
          <td>${perfCell}</td>
          <td>${feedbackBadge}</td>
          <td>${answerBadge}</td>
          <td>${analysisBadge}</td>`;
        tbody.appendChild(tr);
      }
    }

    // 페이지네이션
    const pg = document.getElementById('history-pagination');
    pg.style.display = data.total > 0 ? 'flex' : 'none';
    document.getElementById('page-info').textContent =
      `${currentPage} / ${totalPages} 페이지 (총 ${data.total.toLocaleString()}건)`;
    document.getElementById('page-prev').disabled = currentPage <= 1;
    document.getElementById('page-next').disabled = currentPage >= totalPages;
  }

  function buildAnalysisBadge(row) {
    if (!row.analysis_status) return '<span style="color:#ccc">—</span>';
    if (row.analysis_status === 'pending') return '<span class="badge badge-pending">작성중…</span>';
    if (row.analysis_status === 'done')
      return `<span class="badge badge-done" onclick="event.stopPropagation();openAnalysisModal(${row.id})">📋 보기</span>`;
    if (row.analysis_status === 'error') return '<span class="badge badge-error">오류</span>';
    return '—';
  }

  function resetHistoryFilter() {
    document.getElementById('h-q').value = '';
    document.getElementById('h-from').value = '';
    document.getElementById('h-to').value = '';
    document.getElementById('h-no-answer').value = '';
    document.getElementById('h-feedback').value = '';
    loadHistory(1);
  }

  // ── 모달 공용 ─────────────────────────────────────────────────────────────
  function showModal(title, bodyHtml) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHtml;
    document.getElementById('modal-backdrop').classList.add('open');
  }
  function closeModal(e) {
    if (e.target === document.getElementById('modal-backdrop')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('modal-backdrop').classList.remove('open');
  }

  // 답변 상세 모달
  async function openDetailModal(recordId) {
    let data;
    try {
      const res = await fetch(`/admin/history/${recordId}/detail`);
      if (!res.ok) return;
      data = await res.json();
    } catch(e) { return; }

    const meta = `<div class="modal-meta">
      <span>🕐 ${fmtTsFull(data.created_at)}</span>
      <span>⏱ ${data.response_time_ms != null ? fmtMs(data.response_time_ms) : '—'}</span>
      ${data.is_no_answer ? '<span style="color:#c62828">⚠️ 답변없음</span>' : ''}
      ${data.feedback === 1 ? '<span>👍 만족</span>' : data.feedback === -1 ? '<span>👎 불만족</span>' : ''}
    </div>`;

    let html = meta
      + `<div class="modal-section"><label>질문</label><div class="content-box">${escHtml(data.question)}</div></div>`
      + `<div class="modal-section"><label>답변</label><div class="content-box markdown-body">${renderMd(data.answer)}</div></div>`;

    showModal(`질문 #${data.id}`, html);
  }

  // 참고문서 모달
  async function openRefsModal(recordId) {
    let data;
    try {
      const res = await fetch(`/admin/history/${recordId}/detail`);
      if (!res.ok) return;
      data = await res.json();
    } catch(e) { return; }

    const refs = data.references || [];
    if (refs.length === 0) { showModal('참고문서', '<p class="empty">참고 문서 없음</p>'); return; }

    const SRC_META = {
      jira:       { label: 'J', bg: '#0052CC', name: 'Jira' },
      confluence: { label: 'C', bg: '#0065FF', name: 'Confluence' },
      sharepoint: { label: 'S', bg: '#038387', name: 'SharePoint' },
      teams:      { label: 'T', bg: '#6264A7', name: 'Teams' },
    };

    function refTitle(r) {
      const src = r.source || '';
      if (src === 'jira') return r.issue_key ? `[${r.issue_key}] ${r.title}` : r.title;
      if (src === 'confluence') {
        const parts = [];
        if (r.space_name) parts.push(r.space_name);
        if (r.ancestors) r.ancestors.split(' / ').forEach(a => parts.push(a));
        parts.push(r.title);
        return parts.join(' / ');
      }
      if (src === 'sharepoint') {
        try {
          const u = new URL(r.url);
          const fileParam = u.searchParams.get('file');
          if (fileParam) return decodeURIComponent(fileParam);
          const parts = u.pathname.split('/');
          const lastSeg = decodeURIComponent(parts[parts.length - 1] || '');
          if (lastSeg && !lastSeg.toLowerCase().endsWith('.aspx')) return lastSeg;
        } catch (_) {}
        return r.title;
      }
      if (src === 'teams') {
        const prefix = r.team_name && r.channel_name ? `[${r.team_name}/${r.channel_name}] `
          : r.chat_topic ? `[${r.chat_topic}] ` : '';
        return prefix + (r.author ? `${r.author}: ` : '') + (r.snippet || '').replace(/\s+/g, ' ').slice(0, 60);
      }
      return r.title || r.url;
    }

    function refSubInfo(r) {
      const parts = [];
      if (r.author) parts.push(`<span>✍ ${escHtml(r.author)}</span>`);
      if (r.created_at) {
        try {
          const d = new Date(r.created_at);
          parts.push(`<span>📅 ${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}</span>`);
        } catch {}
      }
      try {
        const host = new URL(r.url).hostname.replace('www.', '');
        parts.push(`<span style="color:#bbb">${escHtml(host)}</span>`);
      } catch {}
      return parts.join('<span style="color:#ddd;margin:0 4px">·</span>');
    }

    const cards = refs.map((r, i) => {
      const src  = r.source || '';
      const meta = SRC_META[src] || { label: '?', bg: '#888', name: src };
      const title = refTitle(r);
      const sub   = refSubInfo(r);
      return `
        <a href="${escHtml(r.url)}" target="_blank" rel="noopener noreferrer" style="display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid #eee;border-radius:8px;text-decoration:none;color:inherit;transition:background .15s;margin-bottom:8px" onmouseover="this.style.background='#f8f8ff'" onmouseout="this.style.background=''">
          <div style="flex-shrink:0;margin-top:2px">
            <span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;background:${meta.bg};color:#fff;font-size:11px;font-weight:700">${meta.label}</span>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:.88rem;font-weight:600;color:#1a1a2e;line-height:1.4;word-break:break-word">${escHtml(title)}</div>
            ${sub ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;font-size:.76rem;color:#888">${sub}</div>` : ''}
          </div>
          <div style="flex-shrink:0;color:#bbb;font-size:13px;margin-top:3px">↗</div>
        </a>`;
    }).join('');

    showModal(`참고문서 (${refs.length}건)`,
      `<div style="padding:4px 0">${cards}</div>`);
  }

  // ms → "234ms" 또는 "1.2s" 포맷
  function fmtMs(ms) {
    if (ms == null) return '—';
    if (ms < 1000) return ms + 'ms';
    return (ms / 1000).toFixed(1) + 's';
  }

  // 응답시간 상세 모달 (스택바 차트)
  async function openPerfModal(recordId) {
    let data;
    try {
      const res = await fetch(`/admin/history/${recordId}/detail`);
      if (!res.ok) return;
      data = await res.json();
    } catch(e) { return; }

    const p = data.perf;
    let html;
    if (!p) {
      html = `<div style="padding:8px 0;color:#888">이전 기록은 단계별 시간이 없습니다. (총 ${fmtMs(data.response_time_ms)})</div>`;
    } else {
      const total   = p.total_ms || 1;
      const vMs     = p.vector_ms  ?? null;
      const kMs     = p.keyword_ms ?? null;
      const iMs     = p.inject_ms  ?? null;
      const hasSub  = vMs !== null && kMs !== null;
      const hasInj  = iMs !== null && iMs > 0;
      const rMs     = p.retrieval_ms;
      const lMs     = p.llm_ms;

      // 스택바 비율 (벡터/FTS 분리 or 검색 통합 + 직접조회)
      const vPct = hasSub ? Math.max(1, Math.round(vMs / total * 100)) : 0;
      const kPct = hasSub ? Math.max(1, Math.round(kMs / total * 100)) : 0;
      const iPct = hasInj ? Math.max(1, Math.round(iMs / total * 100)) : 0;
      const rPct = hasSub ? Math.max(1, Math.round(rMs / total * 100)) : Math.max(1, Math.round(rMs / total * 100));
      const lPct = Math.max(1, 100 - rPct - iPct);

      const dot = (color) => `<span style="display:inline-block;width:9px;height:9px;background:${color};border-radius:2px;margin-right:5px;flex-shrink:0"></span>`;

      html = `
        <div style="margin-bottom:16px">
          <!-- 스택바 -->
          <div style="display:flex;height:26px;border-radius:6px;overflow:hidden;font-size:.72rem;font-weight:600;gap:1px">
            ${hasSub ? `
            <div style="width:${vPct}%;background:#6264a7;display:flex;align-items:center;justify-content:center;color:#fff;min-width:4px" title="벡터 ${fmtMs(vMs)}">
              ${vPct >= 10 ? '벡터' : ''}
            </div>
            <div style="width:${kPct}%;background:#8b5cf6;display:flex;align-items:center;justify-content:center;color:#fff;min-width:4px" title="FTS ${fmtMs(kMs)}">
              ${kPct >= 10 ? 'FTS' : ''}
            </div>
            ` : `
            <div style="width:${rPct}%;background:#6264a7;display:flex;align-items:center;justify-content:center;color:#fff;min-width:4px" title="검색 ${fmtMs(rMs)}">
              ${rPct >= 10 ? '검색' : ''}
            </div>
            `}
            ${hasInj ? `
            <div style="width:${iPct}%;background:#f59e0b;display:flex;align-items:center;justify-content:center;color:#fff;min-width:4px" title="직접조회 ${fmtMs(iMs)}">
              ${iPct >= 10 ? '직접조회' : ''}
            </div>
            ` : ''}
            <div style="width:${lPct}%;background:#0078d4;display:flex;align-items:center;justify-content:center;color:#fff;min-width:4px" title="LLM ${fmtMs(lMs)}">
              ${lPct >= 10 ? 'LLM' : ''}
            </div>
          </div>
          <!-- 범례 -->
          <div style="display:flex;gap:14px;margin-top:7px;font-size:.78rem;color:#555;flex-wrap:wrap">
            ${hasSub ? `
            <span style="display:flex;align-items:center">${dot('#6264a7')}ChromaDB 벡터</span>
            <span style="display:flex;align-items:center">${dot('#8b5cf6')}FTS 키워드</span>
            ` : `<span style="display:flex;align-items:center">${dot('#6264a7')}검색</span>`}
            ${hasInj ? `<span style="display:flex;align-items:center">${dot('#f59e0b')}Jira 직접조회</span>` : ''}
            <span style="display:flex;align-items:center">${dot('#0078d4')}LLM 생성</span>
          </div>
        </div>
        <!-- 상세 수치 -->
        <table style="width:100%;border-collapse:collapse;font-size:.88rem">
          <thead>
            <tr style="border-bottom:1px solid #eee">
              <th style="text-align:left;padding:5px 8px;color:#999;font-weight:500;font-size:.75rem">구분</th>
              <th style="text-align:right;padding:5px 8px;color:#999;font-weight:500;font-size:.75rem">시간</th>
            </tr>
          </thead>
          <tbody>
            ${hasSub ? `
            <tr>
              <td style="padding:8px 8px 4px">${dot('#6264a7')}ChromaDB 벡터검색</td>
              <td style="text-align:right;padding:8px 8px 4px;font-weight:700;color:#1a1a2e">${fmtMs(vMs)}</td>
            </tr>
            <tr>
              <td style="padding:4px 8px 8px;border-bottom:1px solid #f0f0f0">${dot('#8b5cf6')}FTS 키워드검색</td>
              <td style="text-align:right;padding:4px 8px 8px;font-weight:700;color:#1a1a2e;border-bottom:1px solid #f0f0f0">${fmtMs(kMs)}</td>
            </tr>
            ` : `
            <tr>
              <td style="padding:8px;border-bottom:1px solid #f0f0f0">${dot('#6264a7')}검색 (ChromaDB + FTS)</td>
              <td style="text-align:right;padding:8px;font-weight:700;color:#1a1a2e;border-bottom:1px solid #f0f0f0">${fmtMs(rMs)}</td>
            </tr>
            `}
            ${hasInj ? `
            <tr>
              <td style="padding:8px;border-bottom:1px solid #f0f0f0">${dot('#f59e0b')}Jira 직접조회</td>
              <td style="text-align:right;padding:8px;font-weight:700;color:#1a1a2e;border-bottom:1px solid #f0f0f0">${fmtMs(iMs)}</td>
            </tr>
            ` : ''}
            <tr>
              <td style="padding:8px">${dot('#0078d4')}LLM 생성 (OpenAI)</td>
              <td style="text-align:right;padding:8px;font-weight:700;color:#1a1a2e">${fmtMs(lMs)}</td>
            </tr>
            <tr style="border-top:2px solid #eee">
              <td style="padding:10px 8px;font-weight:600">총 응답시간</td>
              <td style="text-align:right;padding:10px 8px;font-size:1.15rem;font-weight:700;color:#6264a7">${fmtMs(p.total_ms)}</td>
            </tr>
          </tbody>
        </table>
        <div style="font-size:.76rem;color:#aaa;margin-top:4px;padding:0 8px">검색 문서 ${p.doc_count}개${p.model ? ` &nbsp;·&nbsp; 모델: <code style="background:#f0f0f0;padding:1px 5px;border-radius:3px">${escHtml(p.model)}</code>` : ''}</div>`;
    }
    showModal(`응답시간 상세 #${recordId}`, html);
  }

  // 조사 결과 모달
  async function openAnalysisModal(recordId) {
    let data;
    try {
      const res = await fetch(`/admin/history/${recordId}/analysis`);
      if (!res.ok) return;
      data = await res.json();
    } catch(e) { return; }

    const content = data.no_answer_analysis || '<p style="color:#888">분석 결과 없음</p>';
    showModal(`결과분석 #${recordId}`,
      `<div class="analysis-box">${content}</div>`);
  }

  // ── 설정 ──────────────────────────────────────────────────────────────────
  async function loadSettings() {
    try {
      const res = await fetch('/admin/settings/data');
      if (!res.ok) return;
      const data = await res.json();
      document.getElementById('toggle-analyze').checked = !!data.analyze_no_answer;
    } catch(e) {}
  }

  async function updateSetting(key, value) {
    try {
      await fetch('/admin/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [key]: value }),
      });
    } catch(e) {
      alert('설정 저장 실패: ' + e.message);
    }
  }

  // ── 초기화 ────────────────────────────────────────────────────────────────
  loadStats();
</script>
</body>
</html>
